apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-banking-deployment
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend-banking-deployment
  template:
    metadata:
      labels:
        app: frontend-banking-deployment
    spec:
#      imagePullSecrets:
#      - name: registry-testnico-registry
      serviceAccountName: bank-app-ksa
      containers:
      - name: frontend-bank-container
        image: us-central1-docker.pkg.dev/development-423908/bank-repo/bank-app
        ports:
        - containerPort: 3000
        env:
        - name: REACT_APP_API_URL
          value: "http://bankapi.34.136.233.124.sslip.io"
        resources:
          requests:
            memory: "256Mi"
            cpu: "50m"
          limits:
            memory: "512Mi"
            cpu: "300m"  